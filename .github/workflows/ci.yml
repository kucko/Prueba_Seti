name: CI

on:
  push:
  pull_request:

jobs:
  pruebas:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Instalar dependencias
        run: pip install -r requirements.txt
      - name: Prueba de humo end-to-end (modo offline, sin API key)
        env:
          USAR_LLM_FALSO: "1"
        run: python -m tests.prueba_humo
      - name: Prueba de la interfaz (AppTest, sin navegador)
        env:
          USAR_LLM_FALSO: "1"
        run: python -m tests.prueba_interfaz
